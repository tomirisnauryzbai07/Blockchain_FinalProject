name: CI

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show toolchain
        run: forge --version

      - name: Build contracts
        run: forge build

      - name: Run contract tests
        run: forge test
